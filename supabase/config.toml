project_id = "captionflow"

[api]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
enable_signup = true

[auth.email]
enable_confirmations = true

# Google OAuth — provide GOOGLE_CLIENT_ID/SECRET via env when running locally.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret    = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[storage]
enabled = true
file_size_limit = "500MiB"

# Functions configured per-folder; deploy with `supabase functions deploy <name>`.

# Lemon Squeezy posts webhooks without a Supabase JWT; the function verifies
# the X-Signature HMAC itself, so JWT verification is disabled here.
[functions.lemonsqueezy-webhook]
verify_jwt = false

# Setup helper auto-discovers the store + variant IDs (read-only).
[functions.lemonsqueezy-setup]
verify_jwt = true

# Translator: authenticated by the user's session (the function returns 401 to
# anonymous callers) and calls Google Cloud Translation server-side, so the
# platform JWT gate is off and the function does its own auth.
[functions.translate]
verify_jwt = false

# Security tools accept anonymous (client-gated) traffic and do their own
# per-user bucket enforcement, so the platform JWT gate is off here too.
# (The public anon key would satisfy verify_jwt anyway; keeping it off matches
# the documented `--no-verify-jwt` deploy and the function's own auth logic.)
[functions.security-tools]
verify_jwt = false
