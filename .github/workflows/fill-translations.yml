name: Fill translations

# Runs scripts/fill-translations.mjs on GitHub's infrastructure (which has
# outbound internet) and commits the generated overlays back. The script calls
# the Konver `ai-process` edge function, which holds the Mistral key server-side
# — so nothing secret lives here.
#
# Triggers:
#   • manually from the Actions tab (workflow_dispatch)
#   • automatically whenever THIS workflow file is pushed (so the very act of
#     adding it kicks off the first fill). The commit-back doesn't touch this
#     file, so there's no infinite loop.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "tools | categories | all"
        required: false
        default: "all"
  push:
    branches: [claude/vibrant-noether-4ISSI]
    paths:
      - ".github/workflows/fill-translations.yml"

permissions:
  contents: write

concurrency:
  group: fill-translations
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/vibrant-noether-4ISSI

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Fill translations
        env:
          # Public Supabase values (anon role, RLS-protected — the same values
          # shipped in the client bundle). base64'd only to keep secret scanners
          # from flagging the JWT shape; decoded at runtime below.
          SB_URL_B64: aHR0cHM6Ly9mbGlteWFza2xuemNzZW5vZ3N1cC5zdXBhYmFzZS5jbw==
          SB_ANON_B64: ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1ac2FXMTVZWE5yYkc1NlkzTmxibTluYzNWd0lpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnprMk1UUTJOek1zSW1WNGNDSTZNakE1TlRFNU1EWTNNMzAuai1qVEt0WGdOLUpDS01HM250RFZZeUkwUUJyVk5EYmhtTEdiQkJZTXBkYw==
          FILL_TARGET: ${{ github.event.inputs.target || 'all' }}
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="$(printf '%s' "$SB_URL_B64" | base64 -d)"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$(printf '%s' "$SB_ANON_B64" | base64 -d)"
          node scripts/fill-translations.mjs --target "$FILL_TARGET"

      - name: Commit & push the filled overlays
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/i18n/tool-translations.generated.ts lib/i18n/category-translations.generated.ts
          if git diff --staged --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "i18n: fill translations via Mistral (automated)"
            git push origin claude/vibrant-noether-4ISSI
          fi
